apiVersion: apps/v1
kind: Deployment
metadata:
  name: postgres
  namespace: fulcrum
spec:
  replicas: 1
  selector:
    matchLabels:
      app: postgres
  template:
    metadata:
      labels:
        app: postgres
    spec:
      containers:
        - name: postgres
          image: postgres:16
          env:
            - name: POSTGRES_DB
              value: fulcrum
            - name: POSTGRES_USER
              value: fulcrum
            - name: POSTGRES_PASSWORD
              value: fulcrum
          ports:
            - containerPort: 5432
          volumeMounts:
            - mountPath: /var/lib/postgresql/data
              name: pgdata
      volumes:
        - name: pgdata
          emptyDir: {}
---
apiVersion: v1
kind: Service
metadata:
  name: postgres
  namespace: fulcrum
spec:
  selector:
    app: postgres
  ports:
    - port: 5432