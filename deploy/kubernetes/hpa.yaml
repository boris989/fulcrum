apiVersion: autoscaling/v2
kind: HorizontalPodAutoscaler
metadata:
  name: fulcrum
  namespace: fulcrum
spec:
  scaleTargetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: fulcrum
  minReplicas: 2
  maxReplicas: 5
  metrics:
    - type: Resource
      resource:
        name: cpu
        target:
          type: Utilization
          averageUtilization: 70