apiVersion: apps/v1
kind: Deployment
metadata:
  name: pyroscope
  namespace: fulcrum
spec:
  replicas: 1
  selector:
    matchLabels:
      app: pyroscope
  template:
    metadata:
      labels:
        app: pyroscope
    spec:
      containers:
        - name: pyroscope
          image: grafana/pyroscope:1.5.0
          ports:
            - containerPort: 4040
---
apiVersion: v1
kind: Service
metadata:
  name: pyroscope
  namespace: fulcrum
spec:
  selector:
    app: pyroscope
  ports:
    - port: 4040
      targetPort: 4040